<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // Detect language from path (/en, /fr, /he) and load index.html
    // while preserving the original URL
    const path = window.location.pathname;
    const match = path.match(/^\/(en|fr|he)(?:\/|$)/);

    if (match) {
      const lang = match[1];
      localStorage.setItem('lang', lang);
    }

    // Load index.html content and inject it into the page
    // The URL stays the same (e.g., /en, /fr, /he) in the address bar
    fetch('/index.html')
      .then(response => response.text())
      .then(html => {
        // Parse the fetched HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Replace current document with fetched content
        document.documentElement.replaceWith(doc.documentElement);
      })
      .catch(() => {
        // Fallback if fetch fails
        window.location = '/';
      });
  </script>
</head>
<body>Loading...</body>
</html>
