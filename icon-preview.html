<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@700&display=swap" rel="stylesheet">
<style>
  body { background: #D6EDE4; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; margin: 0; font-family: 'Figtree', system-ui; }
  .row { display: flex; align-items: center; gap: 48px; flex-wrap: wrap; justify-content: center; }
  .option { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .label { font-size: 13px; color: #3E5750; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .wordmark { font-size: 38px; font-weight: 700; color: #00C281; letter-spacing: -0.01em; line-height: 1; font-family: 'Figtree', system-ui; }
  .icon { width: 56px; height: 56px; border-radius: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* Current */
  .icon-current { background: #C7F4E2; color: #00382A; }

  /* Option A: Accent fill */
  .icon-a { background: #00C281; color: #04261B; }

  /* Option B: Dark fill */
  .icon-b { background: #163526; color: #00D68F; }

  /* Option C: No background */
  .icon-c { background: transparent; color: #00C281; }

  /* Option D: Outlined — surface fill + accent border */
  .icon-d { background: #E9F6F0; color: #00A06A; border: 2.5px solid #00C281; }

  /* Option E: Saturated tonal — brighter mint, not full accent */
  .icon-e { background: #7FDBBA; color: #00382A; }

  /* Option F: Accent fill, white icon */
  .icon-f { background: #00C281; color: #ffffff; }
</style>
</head>
<body>

<div class="row">

  <div class="option">
    <div class="logo">
      <span class="wordmark">WhenFree</span>
      <div class="icon icon-current">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="30" height="30"><rect x="5" y="8.5" width="22" height="17" rx="3" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.4" stroke-opacity="0.5"/><rect x="5" y="8.5" width="22" height="5.5" rx="3" fill="currentColor" fill-opacity="0.22"/><rect x="5" y="11.5" width="22" height="2.5" fill="currentColor" fill-opacity="0.22"/><rect x="10.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><rect x="19.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><path d="M10.5 18.5 L14.5 22.5 L21.5 14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </div>
    </div>
    <span class="label">Current</span>
  </div>

  <div class="option">
    <div class="logo">
      <span class="wordmark">WhenFree</span>
      <div class="icon icon-a">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="30" height="30"><rect x="5" y="8.5" width="22" height="17" rx="3" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.4" stroke-opacity="0.5"/><rect x="5" y="8.5" width="22" height="5.5" rx="3" fill="currentColor" fill-opacity="0.22"/><rect x="5" y="11.5" width="22" height="2.5" fill="currentColor" fill-opacity="0.22"/><rect x="10.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><rect x="19.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><path d="M10.5 18.5 L14.5 22.5 L21.5 14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </div>
    </div>
    <span class="label">Option A — Accent fill</span>
  </div>

  <div class="option">
    <div class="logo">
      <span class="wordmark">WhenFree</span>
      <div class="icon icon-b">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="30" height="30"><rect x="5" y="8.5" width="22" height="17" rx="3" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.4" stroke-opacity="0.5"/><rect x="5" y="8.5" width="22" height="5.5" rx="3" fill="currentColor" fill-opacity="0.22"/><rect x="5" y="11.5" width="22" height="2.5" fill="currentColor" fill-opacity="0.22"/><rect x="10.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><rect x="19.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><path d="M10.5 18.5 L14.5 22.5 L21.5 14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </div>
    </div>
    <span class="label">Option B — Dark fill</span>
  </div>

  <div class="option">
    <div class="logo">
      <span class="wordmark">WhenFree</span>
      <div class="icon icon-c">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="30" height="30"><rect x="5" y="8.5" width="22" height="17" rx="3" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.4" stroke-opacity="0.5"/><rect x="5" y="8.5" width="22" height="5.5" rx="3" fill="currentColor" fill-opacity="0.22"/><rect x="5" y="11.5" width="22" height="2.5" fill="currentColor" fill-opacity="0.22"/><rect x="10.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><rect x="19.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><path d="M10.5 18.5 L14.5 22.5 L21.5 14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </div>
    </div>
    <span class="label">Option C — No background</span>
  </div>

</div>

<div class="row">

  <div class="option">
    <div class="logo">
      <span class="wordmark">WhenFree</span>
      <div class="icon icon-d">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="30" height="30"><rect x="5" y="8.5" width="22" height="17" rx="3" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.4" stroke-opacity="0.5"/><rect x="5" y="8.5" width="22" height="5.5" rx="3" fill="currentColor" fill-opacity="0.22"/><rect x="5" y="11.5" width="22" height="2.5" fill="currentColor" fill-opacity="0.22"/><rect x="10.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><rect x="19.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><path d="M10.5 18.5 L14.5 22.5 L21.5 14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </div>
    </div>
    <span class="label">Option D — Outlined</span>
  </div>

  <div class="option">
    <div class="logo">
      <span class="wordmark">WhenFree</span>
      <div class="icon icon-e">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="30" height="30"><rect x="5" y="8.5" width="22" height="17" rx="3" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.4" stroke-opacity="0.5"/><rect x="5" y="8.5" width="22" height="5.5" rx="3" fill="currentColor" fill-opacity="0.22"/><rect x="5" y="11.5" width="22" height="2.5" fill="currentColor" fill-opacity="0.22"/><rect x="10.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><rect x="19.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><path d="M10.5 18.5 L14.5 22.5 L21.5 14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </div>
    </div>
    <span class="label">Option E — Saturated tonal</span>
  </div>

  <div class="option">
    <div class="logo">
      <span class="wordmark">WhenFree</span>
      <div class="icon icon-f">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="30" height="30"><rect x="5" y="8.5" width="22" height="17" rx="3" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.4" stroke-opacity="0.5"/><rect x="5" y="8.5" width="22" height="5.5" rx="3" fill="currentColor" fill-opacity="0.22"/><rect x="5" y="11.5" width="22" height="2.5" fill="currentColor" fill-opacity="0.22"/><rect x="10.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><rect x="19.5" y="5.5" width="2" height="5" rx="1" fill="currentColor"/><path d="M10.5 18.5 L14.5 22.5 L21.5 14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </div>
    </div>
    <span class="label">Option F — Accent + white icon</span>
  </div>

</div>

</body>
</html>
